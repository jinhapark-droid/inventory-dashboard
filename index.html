<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urban Side — 재고 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0f0f13;
  --surface: #1a1a22;
  --surface2: #22222e;
  --border: #2e2e3e;
  --accent: #6c63ff;
  --green: #43e97b;
  --orange: #f7971e;
  --red: #ff4d6d;
  --yellow: #ffd166;
  --text: #e8e8f0;
  --muted: #777788;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; }

/* ── Header ── */
.header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 12px 24px; display: flex; align-items: center; gap: 16px;
  position: sticky; top: 0; z-index: 200; flex-wrap: nowrap;
}
.header-brand { display: flex; align-items: center; flex-shrink: 0; }
.header-search { flex: 1; min-width: 0; }
.header-meta { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.logo { font-size: 17px; font-weight: 700; letter-spacing: 1px; }
.badge { background: var(--accent); color: #fff; border-radius: 20px; padding: 3px 10px; font-size: 11px; font-weight: 600; margin-left: 10px; }
.hdr-right { display: flex; align-items: center; gap: 12px; }
.ts { font-size: 12px; color: var(--muted); }
.btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; transition: .15s; }
.btn:hover { border-color: var(--accent); color: var(--accent); }

/* ── Nav ── */
.nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 28px; display: flex; }
.tab { padding: 13px 20px; cursor: pointer; color: var(--muted); font-size: 14px; font-weight: 500; border-bottom: 2px solid transparent; transition: .15s; }
.tab:hover { color: var(--text); }
.tab.on { color: var(--accent); border-bottom-color: var(--accent); }

/* ── Layout ── */
.main { padding: 24px 28px; max-width: 1440px; margin: 0 auto; }
.view { display: none; }
.view.on { display: block; }

/* ── Loading / Error ── */
.loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 320px; gap: 14px; }
.spin { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .75s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.err { background: rgba(255,77,109,.08); border: 1px solid var(--red); border-radius: 10px; padding: 18px 22px; color: var(--red); line-height: 1.6; }

/* ── KPI ── */
.kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 14px; margin-bottom: 24px; }
.kpi { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; position: relative; overflow: hidden; }
.kpi::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--kpi-color, var(--accent)); }
.kpi-label { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; }
.kpi-val { font-size: 28px; font-weight: 700; line-height: 1; }
.kpi-sub { font-size: 12px; color: var(--muted); margin-top: 5px; }

/* ── Section ── */
.sec { margin-bottom: 24px; }
.sec-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
.sec-title { font-size: 14px; font-weight: 600; }
.controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

/* ── Card ── */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
.card canvas { max-height: 320px; }

/* ── Grid ── */
.g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
@media (max-width: 1000px) { .g3 { grid-template-columns: 1fr 1fr; } }
@media (max-width: 700px) { .g2, .g3 { grid-template-columns: 1fr; } }

/* ── Toggle ── */
.tgl { display: flex; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.tgl-btn { padding: 6px 14px; cursor: pointer; color: var(--muted); font-size: 13px; font-weight: 500; border: none; background: none; transition: .15s; }
.tgl-btn.on { background: var(--accent); color: #fff; }

/* ── Select ── */
select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 6px 11px; border-radius: 8px; font-size: 13px; outline: none; cursor: pointer; }
select:focus { border-color: var(--accent); }

/* ── Table ── */
.tbl-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: auto; max-height: 480px; }
table { width: 100%; border-collapse: collapse; min-width: 600px; }
thead { position: sticky; top: 0; background: var(--surface2); z-index: 10; }
th { padding: 11px 14px; text-align: left; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; white-space: nowrap; }
td { padding: 10px 14px; border-top: 1px solid var(--border); font-size: 13px; }
tbody tr:hover { background: var(--surface2); }
.pill { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; }
.pill-ok  { background: rgba(67,233,123,.12); color: var(--green); }
.pill-low { background: rgba(255,77,109,.12); color: var(--red); }
.pill-out { background: rgba(255,77,109,.2);  color: var(--red); }
.pill-high{ background: rgba(247,151,30,.12); color: var(--orange); }

/* ── Bar ── */
.bar-list { display: flex; flex-direction: column; gap: 8px; }
.bar-row { display: flex; align-items: center; gap: 10px; }
.bar-key { width: 80px; font-size: 12px; color: var(--muted); text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bar-bg { flex: 1; height: 10px; background: var(--surface2); border-radius: 5px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 5px; background: var(--accent); transition: width .5s; }
.bar-val { width: 56px; font-size: 12px; text-align: right; }

/* ── Search ── */
.search-wrap { position: relative; }
.search-input {
  background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  padding: 7px 60px 7px 36px; border-radius: 8px; font-size: 13px; outline: none;
  width: 100%; transition: border-color .15s;
}
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--muted); }
.search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 14px; pointer-events: none; }
.search-count { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 11px; color: var(--muted); }
mark { background: rgba(108,99,255,.35); color: var(--text); border-radius: 2px; padding: 0 1px; }

/* Scrollbar */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── Apparel Matrix ── */
.matrix-wrap { overflow-x: auto; }
.matrix-table { border-collapse: collapse; font-size: 12px; min-width: 500px; }
.matrix-table th {
  padding: 7px 10px; background: var(--surface2);
  color: var(--muted); font-size: 11px; font-weight: 600;
  text-align: center; white-space: nowrap;
  position: sticky; top: 0; z-index: 5;
}
.matrix-table th.line-col { text-align: left; min-width: 180px; position: sticky; left: 0; z-index: 6; background: var(--surface2); }
.matrix-table td { padding: 6px 10px; border-top: 1px solid var(--border); white-space: nowrap; }
.matrix-table td.line-name { font-weight: 600; font-size: 12px; min-width: 180px; position: sticky; left: 0; background: var(--surface); z-index: 4; }
.matrix-table td.color-name { color: var(--muted); font-size: 11px; padding-left: 16px; position: sticky; left: 0; background: var(--surface); z-index: 4; }
.matrix-table .m-group td { background: var(--surface2); }
.mcel { text-align: center; font-weight: 600; font-variant-numeric: tabular-nums; border-radius: 5px; }
.mcel-0   { color: var(--red);    background: rgba(255,77,109,.15); }
.mcel-low { color: var(--yellow); background: rgba(255,209,102,.12); }
.mcel-ok  { color: var(--green);  background: rgba(67,233,123,.12); }
.mcel-na  { color: var(--border); }
.matrix-totrow td { font-weight: 700; border-top: 2px solid var(--border); color: var(--accent); }
.color-dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
</style>
</head>
<body>

<div class="header">
  <div class="header-brand">
    <span class="logo">URBAN SIDE</span>
    <span class="badge">25FW · 25SS</span>
  </div>
  <div class="header-search">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="searchInput" type="text" placeholder="상품명, 카테고리, 시즌 검색..." oninput="onSearch(this.value)" style="width:100%">
      <span class="search-count" id="searchCount"></span>
    </div>
  </div>
  <div class="header-meta">
    <div style="line-height:1.6;text-align:right">
      <div style="font-size:12px;color:var(--muted);white-space:nowrap" id="ts">로딩 중...</div>
      <div style="font-size:12px;color:var(--muted);white-space:nowrap" id="nextUpdate"></div>
    </div>
    <button class="btn" onclick="init()">↻ 새로고침</button>
  </div>
</div>

<div class="nav">
  <div class="tab on"  onclick="switchTab('summary',this)">재고 현황 요약</div>
  <div class="tab"     onclick="switchTab('trend',this)">일별 재고 추이</div>
  <div class="tab"     onclick="switchTab('dash',this)">종합 대시보드</div>
</div>

<div class="main">

  <!-- ══════════ VIEW: SUMMARY ══════════ -->
  <div class="view on" id="v-summary">
    <div class="loading" id="lsummary"><div class="spin"></div><span style="color:var(--muted)">데이터 불러오는 중…</span></div>
    <div id="csummary" style="display:none">
      <div class="kpi-row" id="kpi1"></div>
      <div class="g2 sec">
        <div>
          <div class="sec-hdr"><span class="sec-title">카테고리별 재고</span></div>
          <div class="card"><canvas id="catChart"></canvas></div>
        </div>
        <div>
          <div class="sec-hdr"><span class="sec-title">사이즈별 재고</span></div>
          <div class="card" id="sizeCard" style="display:flex;flex-direction:column;justify-content:center;min-height:260px"></div>
        </div>
      </div>
      <!-- 어패럴 컬러×사이즈 매트릭스 -->
      <div class="sec" id="apparelMatrixSec">
        <div class="sec-hdr">
          <span class="sec-title">어패럴 잔여 재고 — 컬러 × 사이즈</span>
          <div class="controls">
            <select id="matrixSeason" onchange="drawApparelMatrix()"><option value="">전체 시즌</option></select>
            <select id="matrixLine" onchange="drawApparelMatrix()"><option value="">전체 품목</option></select>
          </div>
        </div>
        <div class="card" style="padding:0;overflow:hidden">
          <div class="matrix-wrap" id="apparelMatrix" style="max-height:520px;overflow:auto"></div>
        </div>
      </div>

      <div class="sec">
        <div class="sec-hdr">
          <span class="sec-title">품목별 재고 상세</span>
          <div class="controls">
            <select id="selSeason" onchange="drawTable()"><option value="">전체 시즌</option></select>
            <select id="selCat" onchange="drawTable()"><option value="">전체 카테고리</option></select>
          </div>
        </div>
        <div class="tbl-wrap">
          <table><thead><tr>
            <th>상품명</th><th>시즌</th><th>카테고리</th><th>사이즈</th>
            <th style="text-align:right">창고재고</th><th style="text-align:right">대기</th><th style="text-align:right">보험</th><th>상태</th>
          </tr></thead><tbody id="tbody1"></tbody></table>
        </div>
      </div>
    </div>
  </div>

  <!-- ══════════ VIEW: TREND ══════════ -->
  <div class="view" id="v-trend">
    <div class="loading" id="ltrend"><div class="spin"></div><span style="color:var(--muted)">데이터 불러오는 중…</span></div>
    <div id="ctrend" style="display:none">
      <div class="sec">
        <div class="sec-hdr">
          <span class="sec-title">일별 재고 추이</span>
          <div class="controls">
            <div class="tgl">
              <button class="tgl-btn on" onclick="setMode('product',this)">품목별</button>
              <button class="tgl-btn"    onclick="setMode('subcat',this)">소분류별</button>
              <button class="tgl-btn"    onclick="setMode('season',this)">시즌별</button>
              <button class="tgl-btn"    onclick="setMode('category',this)">카테고리별</button>
            </div>
            <select id="trendSel" onchange="drawTrend()"></select>
            <select id="trendSel2" onchange="drawTrend()" style="display:none">
              <option value="all">전체 사이즈</option>
            </select>
          </div>
        </div>
        <div class="card"><canvas id="trendChart" style="max-height:380px"></canvas></div>
      </div>
      <div class="sec">
        <div class="sec-hdr"><span class="sec-title">시즌별 전체 추이 (일별 합계)</span></div>
        <div class="card"><canvas id="seasonTrendChart" style="max-height:240px"></canvas></div>
      </div>
    </div>
  </div>

  <!-- ══════════ VIEW: DASHBOARD ══════════ -->
  <div class="view" id="v-dash">
    <div class="loading" id="ldash"><div class="spin"></div><span style="color:var(--muted)">데이터 불러오는 중…</span></div>
    <div id="cdash" style="display:none">
      <div class="kpi-row" id="kpi2"></div>
      <div class="g3 sec">
        <div>
          <div class="sec-hdr"><span class="sec-title">카테고리별</span></div>
          <div class="card"><canvas id="d-cat" style="max-height:220px"></canvas></div>
        </div>
        <div>
          <div class="sec-hdr"><span class="sec-title">시즌별</span></div>
          <div class="card"><canvas id="d-season" style="max-height:220px"></canvas></div>
        </div>
        <div>
          <div class="sec-hdr"><span class="sec-title">소분류별</span></div>
          <div class="card"><canvas id="d-sub" style="max-height:220px"></canvas></div>
        </div>
      </div>
      <div class="sec">
        <div class="sec-hdr"><span class="sec-title">전체 일별 재고 추이</span></div>
        <div class="card"><canvas id="d-trend" style="max-height:240px"></canvas></div>
      </div>
      <div class="g2 sec">
        <div>
          <div class="sec-hdr"><span class="sec-title">재고 부족 품목 (10개 이하)</span></div>
          <div class="tbl-wrap" style="max-height:320px">
            <table><thead><tr><th>상품명</th><th>시즌</th><th>사이즈</th><th style="text-align:right">창고재고</th><th style="text-align:right">대기</th></tr></thead>
            <tbody id="lowTbl"></tbody></table>
          </div>
        </div>
        <div>
          <div class="sec-hdr"><span class="sec-title">사이즈별 재고 분포</span></div>
          <div class="card" id="d-size" style="display:flex;flex-direction:column;justify-content:center;min-height:240px"></div>
        </div>
      </div>

      <div class="sec">
        <div class="sec-hdr">
          <span class="sec-title">소진속도 Top 5</span>
          <div class="tgl">
            <button class="tgl-btn on" onclick="setVeloMode('daily',this)">일별 소진속도</button>
            <button class="tgl-btn"    onclick="setVeloMode('weekly',this)">주간 소진속도</button>
            <button class="tgl-btn"    onclick="setVeloMode('volume',this)">볼륨 순</button>
          </div>
        </div>
        <div class="g2">
          <div class="card"><canvas id="veloChart" style="max-height:280px"></canvas></div>
          <div class="tbl-wrap">
            <table><thead><tr id="veloHead"></tr></thead><tbody id="veloTbl"></tbody></table>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
// ─── Constants ───────────────────────────────────────────
const SHEET  = '1ykrQdlyTKAHmf3qgtfAwHLiLgNeFJ5WD3n0wmjxU4I0';
const GID    = '1461767551';
const GID2   = '1388188128'; // 소진율 시트 (생산수량/잔여/소진율)

// Confirmed column indices from data inspection
const C = {
  name:      0,  // 상품명
  code:      1,  // 상품코드
  cat:       6,  // 상품중분류
  subcat:    7,  // 상품소분류
  season:    8,  // 시즌
  line:      9,  // 라인
  size:      11, // 옵션(사이즈)
  price:     5,  // 원가
  receipt:   13, // 입고
  warehouse: 14, // 창고+일반재고
  waiting:   15, // 대기재고
  insurance: 16, // 보험재고
  // 날짜별 재고: cols 18–32 (15일치, Jun9–Jun23)
  dateStart: 18,
  dateEnd:   32,
};

const PALETTE = [
  '#6c63ff','#43e97b','#f7971e','#ff6584',
  '#4fc3f7','#a29bfe','#fd79a8','#55efc4',
  '#ffeaa7','#74b9ff','#ff7675','#00b894',
];

// ─── State ───────────────────────────────────────────────
let rows  = [];          // data rows (each is an array)
let dates = [];          // [{serial, label}] for date columns
let charts = {};
let trendMode = 'product';
let apparelMeta = {};    // SKU코드 → {total, orders, remaining, rate, line, season, name}

// ─── Init ─────────────────────────────────────────────────
async function init() {
  document.getElementById('ts').textContent = '로딩 중…';
  try {
    await fetchData();
    rendered['summary'] = true;
    renderSummary();
    // Trend and dash are rendered lazily when their tab is first clicked
    const now = new Date();
    document.getElementById('ts').textContent = '최종 업데이트: ' + now.toLocaleString('ko-KR');
    const next = new Date(now);
    next.setHours(19, 0, 0, 0);
    if (now >= next) next.setDate(next.getDate() + 1);
    const diff = next - now;
    const hh = Math.floor(diff / 3600000);
    const mm = Math.floor((diff % 3600000) / 60000);
    const nextLabel = next.getDate() === now.getDate() ? '오늘' : '내일';
    document.getElementById('nextUpdate').textContent =
      `다음 업데이트: ${nextLabel} 오후 7:00 (${hh}시간 ${mm}분 후)`;
  } catch(e) {
    ['lsummary','ltrend','ldash'].forEach(id => {
      document.getElementById(id).innerHTML = `<div class="err">❌ 데이터 로드 실패<br><small>${e.message}</small></div>`;
    });
  }
}

async function fetchData() {
  const [mainRes, metaRes] = await Promise.all([
    fetch(`https://docs.google.com/spreadsheets/d/${SHEET}/gviz/tq?tqx=out:json&gid=${GID}`),
    fetch(`https://docs.google.com/spreadsheets/d/${SHEET}/gviz/tq?tqx=out:json&gid=${GID2}`),
  ]);

  // ── 메인 시트 ──
  const mainText = await mainRes.text();
  const mainJson = JSON.parse(mainText.replace(/^[^(]+\(/, '').replace(/\);?\s*$/, ''));
  const allRows  = mainJson.table.rows;
  rows = allRows.slice(1)
    .map(r => (r.c || []).map(c => (c && c.v !== null && c.v !== undefined) ? c.v : ''))
    .filter(r => String(r[0] || '').trim() !== '');

  const hdr = allRows[0].c;
  dates = [];
  for (let i = C.dateStart; i <= C.dateEnd; i++) {
    const cell = hdr[i];
    if (!cell) continue;
    const serial = cell.v;
    if (typeof serial !== 'number') continue;
    dates.push({ serial, label: excelDateToLabel(serial), colIdx: i });
  }

  // ── 소진율 시트 (GID2) ── 상품명을 키로 사용
  const metaText = await metaRes.text();
  const metaJson = JSON.parse(metaText.replace(/^[^(]+\(/, '').replace(/\);?\s*$/, ''));
  apparelMeta = {};
  metaJson.table.rows.forEach(row => {
    const c    = (row.c || []).map(cell => (cell && cell.v != null) ? cell.v : '');
    const name = String(c[0] || '').trim();
    if (!name) return;
    apparelMeta[name] = {
      name,
      season:    String(c[2] || '').trim(),
      line:      String(c[3] || '').trim(),
      total:     parseFloat(c[5]) || 0,   // F: 생산 수량
      orders:    parseFloat(c[6]) || 0,   // G: 판매 주문
      remaining: parseFloat(c[7]) || 0,   // H: 잔여 수량
      rate:      parseFloat(c[8]) || 0,   // I: 소진율 (0~1)
      exchanges: parseFloat(c[9]) || 0,
      returns:   parseFloat(c[10]) || 0,
    };
  });
}

// Excel serial → "M/D" label
function excelDateToLabel(serial) {
  // Excel epoch: Dec 30, 1899
  const ms = (Math.floor(serial) - 25569) * 86400000;
  const d = new Date(ms);
  return `${d.getMonth()+1}/${d.getDate()}`;
}

function num(row, col) {
  const v = row[col];
  if (v === '' || v === null || v === undefined) return 0;
  const n = parseFloat(String(v).replace(/,/g, ''));
  return isNaN(n) ? 0 : n;
}
function str(row, col) { return String(row[col] ?? '').trim(); }

function setMode(mode, el) {
  trendMode = mode;
  document.querySelectorAll('.tgl-btn').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  const sel2 = document.getElementById('trendSel2');
  sel2.style.display = mode === 'product' ? '' : 'none';
  buildTrendSel();
  drawTrend();
}

function buildTrendSel() {
  let keyFn;
  if (trendMode === 'product')  keyFn = r => str(r, C.line);
  if (trendMode === 'subcat')   keyFn = r => str(r, C.subcat);
  if (trendMode === 'season')   keyFn = r => str(r, C.season);
  if (trendMode === 'category') keyFn = r => str(r, C.cat);

  // Sort items by total stock in date columns (data-rich items first)
  const scoreMap = {};
  rows.forEach(r => {
    const k = keyFn(r); if (!k) return;
    scoreMap[k] = (scoreMap[k] || 0) + (parseFloat(r[C.dateStart]) || 0);
  });
  const items = Object.keys(scoreMap).sort((a,b) => scoreMap[b] - scoreMap[a]);

  const sel = document.getElementById('trendSel');
  const prev = sel.value;
  sel.innerHTML = items.map(it => `<option value="${it}">${it}</option>`).join('');
  if (items.includes(prev)) sel.value = prev;

  if (trendMode === 'product') {
    const sel2 = document.getElementById('trendSel2');
    const sizes = ['전체 사이즈', ...uniq(rows.map(r => str(r, C.size)).filter(Boolean)).sort()];
    sel2.innerHTML = sizes.map(s => `<option value="${s === '전체 사이즈' ? 'all' : s}">${s}</option>`).join('');
  }
}

function drawTrend() {
  if (!dates.length) return;
  const sel    = document.getElementById('trendSel').value;
  const sel2   = document.getElementById('trendSel2').value;
  if (!sel) return;

  let filtered = rows;
  if (trendMode === 'product')  { filtered = rows.filter(r => str(r, C.line) === sel); if (sel2 !== 'all') filtered = filtered.filter(r => str(r, C.size) === sel2); }
  if (trendMode === 'subcat')   filtered = rows.filter(r => str(r, C.subcat)  === sel);
  if (trendMode === 'season')   filtered = rows.filter(r => str(r, C.season)  === sel);
  if (trendMode === 'category') filtered = rows.filter(r => str(r, C.cat)     === sel);

  const labels = dates.map(d => d.label);
  const data   = dates.map(d => filtered.reduce((s,r) => s + num(r, d.colIdx), 0));

  destroyChart('trendChart');
  charts.trendChart = new Chart(document.getElementById('trendChart'), {
    type: 'line',
    data: { labels, datasets: [{
      label: sel + (sel2 && sel2 !== 'all' ? ` (${sel2})` : ''),
      data, borderColor: '#6c63ff', backgroundColor: 'rgba(108,99,255,.1)',
      fill: true, tension: 0.4, pointRadius: 5, pointHoverRadius: 7,
      pointBackgroundColor: '#6c63ff',
    }]},
    options: lineOpts('재고 수량 (개)')
  });
}

function drawSeasonTrend() {
  if (!dates.length) return;
  const seasons = uniq(rows.map(r => str(r, C.season)).filter(Boolean)).sort();
  const labels  = dates.map(d => d.label);
  const datasets = seasons.map((s, i) => ({
    label: s,

    type: 'line',
    data: { labels, datasets },

}

// ─── Helpers ─────────────────────────────────────────────
function kpiHTML(items) {
  return items.map(it => `
    <div class="kpi" style="--kpi-color:${it.color}">
      <div class="kpi-label">${it.label}</div>
      <div class="kpi-val">${it.val}</div>
      ${it.sub ? `<div class="kpi-sub">${it.sub}</div>` : ''}
    </div>`).join('');
}

function groupSum(data, keyFn, valFn) {
  return data.reduce((acc, r) => {
    const k = keyFn(r); acc[k] = (acc[k]||0) + valFn(r); return acc;
  }, {});
}

function uniq(arr) { return [...new Set(arr)]; }

function paletteAlpha(n, a) {
  return Array.from({length: n}, (_,i) => PALETTE[i%PALETTE.length] + (a === '.8' ? 'cc' : ''));
}

function destroyChart(id) {
  if (charts[id]) { charts[id].destroy(); delete charts[id]; }
}

function donut(id, map) {
  return new Chart(document.getElementById(id), {
    type: 'doughnut',
    data: {
      labels: Object.keys(map),
      datasets: [{ data: Object.values(map), backgroundColor: paletteAlpha(Object.keys(map).length, '1'), borderWidth: 0 }]
    },
    options: {
      responsive: true, maintainAspectRatio: true, cutout: '62%',
      plugins: { legend: { position: 'bottom', labels: { color: '#777788', boxWidth: 11, font: { size: 11 }, padding: 10 } } }
    }
  });
}

const baseScaleOpts = {
  x: { ticks: { color: '#777788', maxRotation: 45 }, grid: { color: '#2e2e3e' } },
  y: { ticks: { color: '#777788' }, grid: { color: '#2e2e3e' } }
};

function barOpts() {
  return { responsive: true, maintainAspectRatio: true,
    plugins: { legend: { display: false } },
    scales: baseScaleOpts };
}

function lineOpts(ylabel) {
  return {
    responsive: true, maintainAspectRatio: true,
    interaction: { mode: 'index', intersect: false },
    plugins: { legend: { labels: { color: '#777788', font: { size: 12 } } } },
    scales: {
      x: baseScaleOpts.x,
      y: { ...baseScaleOpts.y, title: { display: true, text: ylabel, color: '#777788', font: { size: 11 } } }
    }
  };
}

// ─── 소진속도 / 볼륨 ──────────────────────────────────────
let veloMode = 'daily';

function setVeloMode(mode, el) {
  veloMode = mode;
  document.querySelectorAll('.tgl-btn').forEach(b => {
    if (['일별 소진속도','주간 소진속도','볼륨 순'].includes(b.textContent)) b.classList.remove('on');
  });
  el.classList.add('on');
  drawVelo();
}

function drawVelo() {
  if (!dates.length) return;

  const firstCol = dates[0].colIdx;
  const lastCol  = dates[dates.length - 1].colIdx;
  const days     = dates.length - 1;
  const medals   = ['🥇','🥈','🥉','4','5'];

  // 드릴다운 상태 (열린 카테고리)
  if (!drawVelo._open) drawVelo._open = new Set();

  // ── 공통: 소분류별 개별 품목 집계 ──
  const catItems = {}; // cat → [{ name, size, consumed, volume, stock, velocity, daysLeft }]
  rows.forEach(r => {
    const cat      = str(r, C.subcat) || str(r, C.cat) || '기타';
    const consumed = num(r, firstCol) - num(r, lastCol);
    const vol      = consumed * num(r, C.price);
    const stock    = num(r, C.warehouse);
    if (!catItems[cat]) catItems[cat] = [];
    catItems[cat].push({
      name: str(r, C.name).replace(/\[.*?\]\s?/, ''),
      size: str(r, C.size),
      consumed,
      volume: consumed > 0 ? vol : 0,
      stock,
      velocity: consumed > 0 ? consumed / days : 0,
      daysLeft: consumed > 0 && stock > 0 ? Math.round(stock / (consumed / days)) : null,
    });
  });

  // 드릴다운 행 생성
  function drillRows(cat, color) {
    if (!drawVelo._open.has(cat)) return '';
    const items = (catItems[cat] || [])
      .filter(it => it.consumed > 0)
      .sort((a, b) => veloMode === 'volume' ? b.volume - a.volume : b.velocity - a.velocity)
      .slice(0, 10);
    if (!items.length) return '';

    const subHead = veloMode === 'volume'
      ? `<th></th><th>상품명</th><th>사이즈</th><th style="text-align:right">소진량</th><th style="text-align:right">볼륨</th><th style="text-align:right">재고</th>`
      : `<th></th><th>상품명</th><th>사이즈</th><th style="text-align:right">일 소진</th><th style="text-align:right">재고</th><th style="text-align:right">예상 소진일</th>`;

    const subRows = items.map(it => {
      const dl = it.daysLeft > 0 ? `${it.daysLeft}일` : it.stock === 0 ? '<span style="color:var(--red)">품절</span>' : '-';
      if (veloMode === 'volume') {
        return `<tr style="background:rgba(108,99,255,.04)">
          <td></td>
          <td style="font-size:12px;padding-left:24px;color:var(--text)">${it.name}</td>
          <td style="font-size:12px;color:var(--muted)">${it.size}</td>
          <td style="text-align:right;font-size:12px">${it.consumed}</td>
          <td style="text-align:right;font-size:12px;color:var(--accent)">₩${Math.round(it.volume/10000).toLocaleString()}만</td>
          <td style="text-align:right;font-size:12px">${it.stock.toLocaleString()}</td>
        </tr>`;
      } else {
        return `<tr style="background:rgba(108,99,255,.04)">
          <td></td>
          <td style="font-size:12px;padding-left:24px;color:var(--text)">${it.name}</td>
          <td style="font-size:12px;color:var(--muted)">${it.size}</td>
          <td style="text-align:right;font-size:12px;color:var(--accent)">${it.velocity.toFixed(1)}</td>
          <td style="text-align:right;font-size:12px">${it.stock.toLocaleString()}</td>
          <td style="text-align:right;font-size:12px">${dl}</td>
        </tr>`;
      }
    }).join('');

    return `<tr style="background:var(--surface2)"><td colspan="6" style="padding:0"><table style="width:100%;border-collapse:collapse">
      <thead><tr style="border-top:1px solid ${color}33">${subHead}</tr></thead>
      <tbody>${subRows}</tbody>
    </table></td></tr>`;
  }

  function toggleDrill(cat) {
    if (drawVelo._open.has(cat)) drawVelo._open.delete(cat);
    else drawVelo._open.add(cat);
    drawVelo();
  }
  window._toggleDrill = toggleDrill;

  if (veloMode === 'volume') {
    document.getElementById('veloHead').innerHTML =
      '<th></th><th>소분류</th><th style="text-align:right">소진량 (개)</th><th style="text-align:right">볼륨 (원가×소진)</th><th style="text-align:right">현재 재고</th><th></th>';

    const catMap = {};
    Object.entries(catItems).forEach(([cat, items]) => {
      const consumed = items.reduce((s,i) => s + i.consumed, 0);
      const volume   = items.reduce((s,i) => s + i.volume, 0);
      const stock    = items.reduce((s,i) => s + i.stock, 0);
      if (consumed > 0) catMap[cat] = { consumed, volume, stock };
    });

    const top5 = Object.entries(catMap)
      .sort((a,b) => b[1].volume - a[1].volume).slice(0,5)
      .map(([cat,d]) => ({ cat, ...d }));

    destroyChart('veloChart');
    charts.veloChart = new Chart(document.getElementById('veloChart'), {
      type: 'bar',
      data: { labels: top5.map(v=>v.cat), datasets: [{ label:'볼륨(₩)', data: top5.map(v=>Math.round(v.volume)), backgroundColor: top5.map((_,i)=>PALETTE[i]+'cc'), borderRadius:6, borderSkipped:false }] },
      options: { indexAxis:'y', responsive:true, maintainAspectRatio:true, plugins:{legend:{display:false}, tooltip:{callbacks:{label:ctx=>'₩'+Math.round(ctx.raw).toLocaleString()}}},
        scales:{ x:{ticks:{color:'#777788',callback:v=>'₩'+Math.round(v/10000)+'만'},grid:{color:'#2e2e3e'}}, y:{ticks:{color:'#e8e8f0',font:{size:11}},grid:{color:'#2e2e3e'}} } }
    });

    document.getElementById('veloTbl').innerHTML = top5.map((v,i) => {
      const isOpen = drawVelo._open.has(v.cat);
      const color  = PALETTE[i];
      return `<tr style="cursor:pointer;border-left:3px solid ${color}" onclick="_toggleDrill('${v.cat.replace(/'/g,"\\'")}')">
        <td style="text-align:center;font-size:15px">${medals[i]}</td>
        <td><span style="color:${color};font-weight:600">${v.cat}</span></td>
        <td style="text-align:right">${v.consumed.toLocaleString()}</td>
        <td style="text-align:right;font-weight:700;color:var(--accent)">₩${Math.round(v.volume/10000).toLocaleString()}만</td>
        <td style="text-align:right">${v.stock.toLocaleString()}</td>
        <td style="color:var(--muted);font-size:12px">${isOpen?'▲ 닫기':'▼ 상세'}</td>
      </tr>${drillRows(v.cat, color)}`;
    }).join('');

  } else {
    const divisor = veloMode === 'daily' ? days : (days/7);
    const unit    = veloMode === 'daily' ? '일 평균 소진 (개)' : '주 평균 소진 (개)';

    document.getElementById('veloHead').innerHTML =
      `<th></th><th>소분류</th><th style="text-align:right">${unit}</th><th style="text-align:right">현재 재고</th><th style="text-align:right">예상 소진일</th><th></th>`;

    const catMap = {};
    Object.entries(catItems).forEach(([cat, items]) => {
      const consumed = items.reduce((s,i) => s + i.consumed, 0);
      const stock    = items.reduce((s,i) => s + i.stock, 0);
      if (consumed > 0) catMap[cat] = { consumed, stock };
    });

    const top5 = Object.entries(catMap)
      .map(([cat,d]) => ({ cat, velocity: d.consumed/divisor, stock: d.stock, daysLeft: Math.round(d.stock/(d.consumed/days)) }))
      .sort((a,b) => b.velocity - a.velocity).slice(0,5);

    destroyChart('veloChart');
    charts.veloChart = new Chart(document.getElementById('veloChart'), {
      type: 'bar',
      data: { labels: top5.map(v=>v.cat), datasets: [{ label:unit, data:top5.map(v=>+v.velocity.toFixed(1)), backgroundColor:top5.map((_,i)=>PALETTE[i]+'cc'), borderRadius:6, borderSkipped:false }] },
      options: { indexAxis:'y', responsive:true, maintainAspectRatio:true, plugins:{legend:{display:false}},
        scales:{ x:{ticks:{color:'#777788'},grid:{color:'#2e2e3e'}}, y:{ticks:{color:'#e8e8f0',font:{size:11}},grid:{color:'#2e2e3e'}} } }
    });

    document.getElementById('veloTbl').innerHTML = top5.map((v,i) => {
      const dl = v.daysLeft > 0 && v.stock > 0 ? `${v.daysLeft}일` : v.stock===0 ? '<span style="color:var(--red)">품절</span>' : '-';
      const isOpen = drawVelo._open.has(v.cat);
      const color  = PALETTE[i];
      return `<tr style="cursor:pointer;border-left:3px solid ${color}" onclick="_toggleDrill('${v.cat.replace(/'/g,"\\'")}')">
        <td style="text-align:center;font-size:15px">${medals[i]}</td>
        <td><span style="color:${color};font-weight:600">${v.cat}</span></td>
        <td style="text-align:right;font-weight:700;color:var(--accent)">${v.velocity.toFixed(1)}</td>
        <td style="text-align:right">${v.stock.toLocaleString()}</td>
        <td style="text-align:right">${dl}</td>
        <td style="color:var(--muted);font-size:12px">${isOpen?'▲ 닫기':'▼ 상세'}</td>
      </tr>${drillRows(v.cat, color)}`;
    }).join('');
  }
}

// ─── 어패럴 컬러×사이즈 매트릭스 ────────────────────────
const STD_SIZES_M = ['XS','S','M','L','XL','XXL'];
const COLOR_DOTS  = {
  '블랙':'#222','화이트':'#eee','그레이':'#888','네이비':'#1a2660',
  '브라운':'#7b5230','베이지':'#d4b896','카키':'#6b7c3d','그린':'#3c7a3c',
  '블루':'#2255cc','레드':'#cc2222','옐로우':'#e0c020','크림':'#f5efda',
  '차콜':'#444','아이보리':'#f0e8d0','버건디':'#7c1a2c','올리브':'#6b7038',
  '핑크':'#e07090','오렌지':'#d46820','퍼플':'#6633aa','멀티':'linear-gradient(135deg,#f66,#6cf,#6f6)',
};

function extractColor(name, line) {
  // 풀네임에서 라인명과 시즌 태그 제거 → 남은 부분이 컬러
  let cleaned = name
    .replace(/\[.*?\]\s?/g, '')
    .replace('어반사이드', '')
    .trim();
  if (line) cleaned = cleaned.replace(line, '').trim();
  return cleaned || '기타';
}

function colorDot(color) {
  const bg = COLOR_DOTS[color] || 'var(--muted)';
  return `<span class="color-dot" style="background:${bg}"></span>`;
}

// 상품코드에서 사이즈 접미사 제거 → 컬러 레벨 코드
function codeBase(code) {
  return code.replace(/-(?:XS|S|M|L|XL|XXL|FREE|OS|ONE)$/i, '').trim();
}

// 소진율 색상
function rateBadge(rate) {
  const pct = Math.round(rate * 100);
  const color = pct >= 80 ? 'var(--red)' : pct >= 50 ? 'var(--orange)' : pct >= 30 ? 'var(--yellow)' : 'var(--green)';
  const bg    = pct >= 80 ? 'rgba(255,77,109,.15)' : pct >= 50 ? 'rgba(247,151,30,.13)' : pct >= 30 ? 'rgba(255,209,102,.12)' : 'rgba(67,233,123,.12)';
  return `<span style="display:inline-block;padding:2px 7px;border-radius:5px;font-size:11px;font-weight:700;color:${color};background:${bg}">${pct}%</span>`;
}

function drawApparelMatrix() {
  const fSeason = document.getElementById('matrixSeason').value;
  const fLine   = document.getElementById('matrixLine').value;

  // ── 소진율 시트 기반으로 품목 목록 구성 ──
  // apparelMeta에 있는 모든 항목을 어패럴로 처리 (다이니마 백팩 등 포함)
  let metaEntries = Object.entries(apparelMeta);
  if (fSeason) metaEntries = metaEntries.filter(([, m]) => m.season === fSeason);
  if (fLine)   metaEntries = metaEntries.filter(([, m]) => m.line   === fLine);

  // ── 원 시트에서 사이즈별 창고 재고 집계 (상품명 기준) ──
  // 시즌 prefix [XX] 있는 모든 행 포함 (카테고리 무관)
  const sizeStock = {}; // 상품명 → { XS:0, S:0, … }
  rows.forEach(r => {
    const name = str(r, C.name);
    if (!name.match(/^\[/)) return; // 시즌 태그 없으면 제외
    const sz = str(r, C.size).toUpperCase();
    const wh = num(r, C.warehouse);
    if (!sizeStock[name]) sizeStock[name] = {};
    sizeStock[name][sz] = (sizeStock[name][sz] || 0) + wh;
  });

  // ── 라인별 그룹화 ──
  const lineMap = {}; // line → [{ name, meta, sizes }]
  metaEntries.forEach(([name, meta]) => {
    const line = meta.line || '기타';
    if (!lineMap[line]) lineMap[line] = [];
    lineMap[line].push({ name, meta, sizes: sizeStock[name] || {} });
  });

  // 사용된 사이즈 컬럼 결정 (STD 순 + 기타)
  const allSzKeys = new Set();
  Object.values(sizeStock).forEach(sz => Object.keys(sz).forEach(k => allSzKeys.add(k)));
  const sizeCols = STD_SIZES_M.filter(s => allSzKeys.has(s));
  const hasEtc   = [...allSzKeys].some(k => !STD_SIZES_M.includes(k));
  if (hasEtc) sizeCols.push('기타');

  function mcel(val) {
    if (val === undefined || val === null) return `<td class="mcel mcel-na">—</td>`;
    if (val === 0) return `<td class="mcel mcel-0">0</td>`;
    if (val <= 10) return `<td class="mcel mcel-low">${val}</td>`;
    return `<td class="mcel mcel-ok">${val.toLocaleString()}</td>`;
  }

  const lines = Object.keys(lineMap).sort();
  const numSz = sizeCols.length;
  // 총 컬럼: 품목/컬러 | 총수량 | 잔여(소진율) | [sizes] | 창고소계
  let html = `<table class="matrix-table">
    <thead><tr>
      <th class="line-col">품목 / 컬러</th>
      <th style="text-align:center">총수량</th>
      <th style="text-align:center">잔여(소진율)</th>
      ${sizeCols.map(s=>`<th>${s}</th>`).join('')}
      <th style="text-align:right">창고소계</th>
    </tr></thead><tbody>`;

  lines.forEach(line => {
    const items = lineMap[line];
    const colorCount = items.length;

    // 라인 합계
    const lineTotalProd = items.reduce((s, it) => s + it.meta.total, 0);
    const lineTotalRem  = items.reduce((s, it) => s + it.meta.remaining, 0);
    const lineRate       = lineTotalProd > 0 ? (lineTotalProd - lineTotalRem) / lineTotalProd : 0;
    const lineSzTotals  = {};
    items.forEach(it => {
      sizeCols.forEach(sz => {
        const v = sz === '기타'
          ? Object.entries(it.sizes).filter(([k]) => !STD_SIZES_M.includes(k)).reduce((s,[,v])=>s+v,0)
          : (it.sizes[sz] || 0);
        lineSzTotals[sz] = (lineSzTotals[sz] || 0) + v;
      });
    });
    const lineWhTotal = sizeCols.reduce((s,sz) => s + (lineSzTotals[sz]||0), 0);

    // 라인 헤더
    html += `<tr class="m-group">
      <td class="line-name" colspan="${numSz + 4}" style="padding:10px 14px;font-size:13px;color:var(--text)">
        ${line}
        <span style="color:var(--muted);font-weight:400;font-size:11px;margin-left:8px">${colorCount}컬러</span>
      </td>
    </tr>`;

    // 컬러별 행
    items.sort((a,b) => a.name.localeCompare(b.name)).forEach(it => {
      const color   = extractColor(it.meta.name, it.meta.line);
      const whTotal = sizeCols.reduce((s,sz) => {
        const v = sz === '기타'
          ? Object.entries(it.sizes).filter(([k]) => !STD_SIZES_M.includes(k)).reduce((s,[,v])=>s+v,0)
          : (it.sizes[sz] || 0);
        return s + v;
      }, 0);
      html += `<tr>
        <td class="color-name">${colorDot(color)}${color}</td>
        <td style="text-align:center;font-size:12px;color:var(--muted)">${it.meta.total.toLocaleString()}</td>
        <td style="text-align:center">${it.meta.total > 0 ? rateBadge(it.meta.rate) : '<span style="color:var(--muted)">—</span>'}</td>
        ${sizeCols.map(sz => {
          const v = sz === '기타'
            ? Object.entries(it.sizes).filter(([k]) => !STD_SIZES_M.includes(k)).reduce((s,[,v])=>s+v,0)
            : (it.sizes[sz]);
          return mcel(v);
        }).join('')}
        <td style="text-align:right;font-weight:600;font-size:12px">${whTotal.toLocaleString()}</td>
      </tr>`;
    });

    // 라인 소계
    html += `<tr class="matrix-totrow">
      <td style="padding-left:14px;font-size:12px;position:sticky;left:0;background:var(--surface)">소계</td>
      <td style="text-align:center;font-size:12px">${lineTotalProd.toLocaleString()}</td>
      <td style="text-align:center">${rateBadge(lineRate)}</td>
      ${sizeCols.map(sz=>`<td class="mcel" style="text-align:center">${(lineSzTotals[sz]||0).toLocaleString()}</td>`).join('')}
      <td style="text-align:right">${lineWhTotal.toLocaleString()}</td>
    </tr>`;
  });

  // 전체 합계
  if (lines.length > 1) {
    const gtProd = metaEntries.reduce((s,[,m]) => s+m.total, 0);
    const gtRem  = metaEntries.reduce((s,[,m]) => s+m.remaining, 0);
    const gtRate = gtProd > 0 ? (gtProd - gtRem) / gtProd : 0;
    const gtSz   = {};
    Object.values(sizeStock).forEach(sz => sizeCols.forEach(col => {
      const v = col === '기타'
        ? Object.entries(sz).filter(([k])=>!STD_SIZES_M.includes(k)).reduce((s,[,v])=>s+v,0)
        : (sz[col]||0);
      gtSz[col] = (gtSz[col]||0) + v;
    }));
    const gtWh = sizeCols.reduce((s,sz) => s+(gtSz[sz]||0), 0);
    html += `<tr style="background:var(--surface2);font-weight:700;border-top:2px solid var(--accent)">
      <td style="padding:10px 14px;position:sticky;left:0;background:var(--surface2);color:var(--accent)">전체 합계</td>
      <td style="text-align:center;color:var(--accent)">${gtProd.toLocaleString()}</td>
      <td style="text-align:center">${rateBadge(gtRate)}</td>
      ${sizeCols.map(sz=>`<td class="mcel" style="text-align:center;color:var(--accent)">${(gtSz[sz]||0).toLocaleString()}</td>`).join('')}
      <td style="text-align:right;color:var(--accent)">${gtWh.toLocaleString()}</td>
    </tr>`;
  }

  html += '</tbody></table>';
  document.getElementById('apparelMatrix').innerHTML = html;
}

function initApparelMatrixFilters() {
  const metas = Object.values(apparelMeta);
  const seasons = uniq(metas.map(m => m.season).filter(Boolean)).sort();
  const lines   = uniq(metas.map(m => m.line).filter(Boolean)).sort();
  document.getElementById('matrixSeason').innerHTML =
    '<option value="">전체 시즌</option>' + seasons.map(s=>`<option>${s}</option>`).join('');
  document.getElementById('matrixLine').innerHTML =
    '<option value="">전체 품목</option>' + lines.map(l=>`<option>${l}</option>`).join('');
  drawApparelMatrix();
}

// ─── 검색 ────────────────────────────────────────────────
let searchQuery = '';

function onSearch(q) {
  searchQuery = q.trim().toLowerCase();

  // 요약 탭으로 전환
  document.querySelectorAll('.view').forEach(v => v.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  document.getElementById('v-summary').classList.add('on');
  document.querySelectorAll('.tab')[0].classList.add('on');

  drawTable();

  // 검색어 있으면 결과 테이블로 스크롤
  if (searchQuery) {
    setTimeout(() => {
      const tbl = document.querySelector('.tbl-wrap');
      if (tbl) tbl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 80);
  }
}

function highlight(text, q) {
  if (!q) return text;
  const escaped = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(escaped, 'gi'), m => `<mark>${m}</mark>`);
}

// ─── Tab switching ────────────────────────────────────────
const rendered = {};
function switchTab(name, el) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  document.getElementById('v-' + name).classList.add('on');
  el.classList.add('on');
  // Re-render charts for tabs that were hidden during init
  if (rows.length && !rendered[name]) {
    rendered[name] = true;
    if (name === 'dash')  renderDash();
    if (name === 'trend') renderTrend();
  }
  // Resize all charts in this view
  Object.values(charts).forEach(c => { try { c.resize(); } catch(e){} });
}

// ─── Start ───────────────────────────────────────────────
init();
</script>
